<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Assignment 5</title>


<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
  }
}
</script>

<p style="color:white;">Press "Start Game" to play.</p>
<p style="color:white;">Try to click all the blocks before the timer runs out. Please zoom in.</p>

<style> 
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:black;
}

#ui{
text-align:center;
color:white;
padding:10px;
}

button{
font-size:18px;
padding:8px 16px;
cursor:pointer;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<div id="ui">
<button id="startBtn">Start Game</button>
<div style="margin-top:8px;">
Time: <span id="timer">30</span> |
Objects Left: <span id="remaining">0</span>
</div>
</div>

<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

function main(){

const canvas = document.querySelector('#c');
const renderer = new THREE.WebGLRenderer({antialias:true, canvas});

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let gameObjects = [];
let timeLeft = 30;
let gameActive = false;

const timerElem = document.getElementById("timer");
const remainingElem = document.getElementById("remaining");
const startBtn = document.getElementById("startBtn");

//camera
const camera = new THREE.PerspectiveCamera(75,2,0.1,10);
camera.position.z = 6;

const scene = new THREE.Scene();

//sky
const bgLoader = new THREE.TextureLoader();
const bgTexture = bgLoader.load('resources/images/sky.jpg');
bgTexture.colorSpace = THREE.SRGBColorSpace;
scene.background = bgTexture;

//cameras
const controls = new OrbitControls(camera, canvas);
controls.target.set(0,0,0);
controls.update();

//lights
scene.add(new THREE.AmbientLight(0xffffff,0.4));

const directionalLight = new THREE.DirectionalLight(0xffffff,1.5);
directionalLight.position.set(-1,2,4);
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0xffaa00,20);
pointLight.position.set(2,2,2);
scene.add(pointLight);

const geometry = new THREE.BoxGeometry(1,1,1);

//cubes
function makeInstance(geometry,color,x){

const material = new THREE.MeshPhongMaterial({color});
const cube = new THREE.Mesh(geometry,material);

cube.position.x = x;

scene.add(cube);
gameObjects.push(cube);

return cube;
}

const cubes = [
makeInstance(geometry,0x44aa88,0),
makeInstance(geometry,0x8844aa,-2),
makeInstance(geometry,0xaa8844,2),
];

//texture cube
const loader = new THREE.TextureLoader();
const texture = loader.load('resources/images/wall.jpg');
texture.colorSpace = THREE.SRGBColorSpace;

const textureMaterial = new THREE.MeshBasicMaterial({map:texture});
const texturedCube = new THREE.Mesh(geometry,textureMaterial);

texturedCube.position.set(0,-2,0);

scene.add(texturedCube);
cubes.push(texturedCube);
gameObjects.push(texturedCube);

//chicken
const gltfLoader = new GLTFLoader();

gltfLoader.load('resources/models/Chicken.glb',(gltf)=>{

const chicken = gltf.scene;
chicken.scale.set(0.01,0.01,0.01);
scene.add(chicken);

});

//shapes extra
const sphereGeometry = new THREE.SphereGeometry(0.5,32,16);
const cylinderGeometry = new THREE.CylinderGeometry(0.4,0.4,1,32);
const shapeMaterial = new THREE.MeshPhongMaterial({color:0x3399ff});

for(let i=0;i<10;i++){

const sphere = new THREE.Mesh(sphereGeometry,shapeMaterial);

sphere.position.set(
(Math.random()-0.5)*10,
(Math.random()-0.5)*6,
(Math.random()-0.5)*10
);

scene.add(sphere);
gameObjects.push(sphere);
}

for(let i=0;i<10;i++){

const cylinder = new THREE.Mesh(cylinderGeometry,shapeMaterial);

cylinder.position.set(
(Math.random()-0.5)*10,
(Math.random()-0.5)*6,
(Math.random()-0.5)*10
);

scene.add(cylinder);
gameObjects.push(cylinder);
}

remainingElem.textContent = gameObjects.length;

//start
startBtn.addEventListener("click",()=>{

gameActive = true;
startBtn.disabled = true;

});

//click mechanism
canvas.addEventListener("click",(event)=>{

if(!gameActive) return;

const rect = canvas.getBoundingClientRect();

mouse.x = ((event.clientX-rect.left)/rect.width)*2-1;
mouse.y = -((event.clientY-rect.top)/rect.height)*2+1;

raycaster.setFromCamera(mouse,camera);

const intersects = raycaster.intersectObjects(gameObjects);

if(intersects.length>0){

const obj = intersects[0].object;

scene.remove(obj);
gameObjects = gameObjects.filter(o=>o!==obj);

remainingElem.textContent = gameObjects.length;

if(gameObjects.length===0){

gameActive=false;
alert("You Win!");

}

}

});

//timer
setInterval(()=>{

if(!gameActive) return;

timeLeft--;
timerElem.textContent = timeLeft;

if(timeLeft<=0){

gameActive=false;

if(gameObjects.length>0){
alert("Time Up!");
}

}

},1000);

//animation
function render(time){

time*=0.001;

cubes.forEach((cube,ndx)=>{

const speed = 1 + ndx*0.1;
const rot = time*speed;

cube.rotation.x = rot;
cube.rotation.y = rot;

});

controls.update();

renderer.render(scene,camera);

requestAnimationFrame(render);
}

requestAnimationFrame(render);

}

main();

</script>

</body>
</html>
